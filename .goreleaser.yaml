# GoReleaser turns one tag push into everything a user might install from: raw
# archives, Linux packages (deb, rpm, apk), and entries for Homebrew. `git tag
# vX.Y.Z && git push --tags` fans out to all of them through
# .github/workflows/release.yml.
#
# hako sandboxes with host facilities (Seatbelt on macOS, namespaces on Linux),
# so it only ships where it can actually enforce: macOS and Linux. There is no
# Windows or FreeBSD build, because a binary that only errored "unsupported" on
# every run would be a trap, not a convenience. WSL users install the Linux
# build.
#
# The Homebrew publish step self-disables when its token is absent, so a release
# with no extra secrets still produces every downloadable archive and Linux
# package; the tap lights up the moment its repository and token exist.
version: 2

project_name: hako

before:
  hooks:
    - go mod download

builds:
  - id: hako
    binary: hako
    main: .
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    targets:
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - linux_386
      - darwin_amd64
      - darwin_arm64

archives:
  - id: default
    ids:
      - hako
    name_template: "hako_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - LICENSE
      - README.md

nfpms:
  # One nfpm definition emits the deb, rpm, and apk for every Linux build. hako
  # is a user command, not a daemon, so there is no unit file and no
  # postinstall: the package is the binary and its license.
  - id: linux-packages
    package_name: hako
    ids:
      - hako
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/hako
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: Run a command inside an OS-level sandbox, built for AI agents.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/hako/LICENSE

homebrew_casks:
  - name: hako
    ids:
      - default
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}'
    directory: Casks
    homepage: https://github.com/tamnd/hako
    description: Run a command inside an OS-level sandbox, built for AI agents
    skip_upload: '{{ if envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: hako
  draft: false
  prerelease: auto
